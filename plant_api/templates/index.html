<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<title>ฐานข้อมูลพืช</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="card">

<h1>🌱 ฐานข้อมูลพืช</h1>

<table>

<thead>
<tr>
<th>รหัส</th>
<th>ชื่อพืช</th>
</tr>
</thead>

<tbody>

{% for plant in plants %}
<tr>
<td>{{ plant.id }}</td>
<td>{{ plant.name }}</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
