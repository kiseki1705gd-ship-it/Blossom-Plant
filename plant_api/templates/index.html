<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Plant Database</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<div class="title">
🌿 Plant Database
</div>

<!-- Form เพิ่มพืชใหม่ -->
<div class="form-box">
<h2>✨ เพิ่มพืชใหม่</h2>
<form id="addPlantForm">
<div class="form-row">
<input type="number" id="id" placeholder="ID" required min="1">
<input type="text" id="name" placeholder="ชื่อพืช" required>
</div>
<div class="form-row">
<input type="text" id="scientific_name" placeholder="ชื่อวิทยาศาสตร์" required>
<input type="text" id="biome" placeholder="ไบโอม (เช่น Tropical, Temperate)" required>
</div>
<div class="form-row">
<select id="type" required>
<option value="">เลือกประเภท</option>
<option value="flower">🌸 Flower (ดอกไม้)</option>
<option value="tree">🌲 Tree (ต้นไม้)</option>
</select>
<button type="submit" class="btn btn-submit">✨ เพิ่มพืช</button>
</div>
</form>
<div id="message" class="message"></div>
</div>

<!-- ตารางแสดงข้อมูลพืช -->
<div class="table-box">
<h2>📊 รายการพืชทั้งหมด</h2>
<table>
<thead>
<tr>
<th>ID</th>
<th>ชื่อพืช</th>
<th>ชื่อวิทยาศาสตร์</th>
<th>ไบโอม</th>
<th>วันที่เพิ่ม</th>
</tr>
</thead>
<tbody>
{% for plant in plants %}
<tr>
<td><strong>{{ plant.id }}</strong></td>
<td>{{ plant.name }}</td>
<td><em>{{ plant.scientific_name }}</em></td>
<td><span class="badge">{{ plant.biome }}</span></td>
<td>{{ plant.created_at[:10] }}</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

</div>

<script>
const form = document.getElementById('addPlantForm');
const messageEl = document.getElementById('message');

form.addEventListener('submit', handleSubmit);

async function handleSubmit(e) {
  e.preventDefault();
  clearMessage();
  
  // Get form values
  const id = document.getElementById('id').value.trim();
  const name = document.getElementById('name').value.trim();
  const scientific_name = document.getElementById('scientific_name').value.trim();
  const biome = document.getElementById('biome').value.trim();
  const type = document.getElementById('type').value.trim();

  // Validate
  if (!id || !name || !scientific_name || !biome || !type) {
    showError('กรุณากรอกข้อมูลให้ครบครัน');
    return;
  }

  const plantData = {
    id: parseInt(id),
    name: name,
    scientific_name: scientific_name,
    biome: biome,
    type: type
  };

  try {
    const response = await fetch('/plants', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(plantData)
    });

    // Parse response
    let responseData = {};
    try {
      responseData = await response.json();
    } catch (e) {
      // Response is not JSON
      console.log('Response is not JSON');
    }

    // Handle response status
    if (response.status === 200 || response.status === 201) {
      showSuccess('✅ เพิ่มพืชสำเร็จ!');
      form.reset();
      setTimeout(() => window.location.reload(), 1200);
    } else if (response.status === 422) {
      // Validation error
      const detail = responseData.detail || 'ข้อมูลไม่ถูกต้อง';
      showError(detail);
    } else if (response.status === 400) {
      const detail = responseData.detail || 'Bad Request';
      showError(detail);
    } else {
      showError('เกิดข้อผิดพลาด: ' + (responseData.detail || response.statusText));
    }

  } catch (error) {
    console.error('Fetch error:', error);
    showError('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้');
  }
}

function showSuccess(message) {
  messageEl.textContent = message;
  messageEl.classList.add('success');
  messageEl.classList.remove('error');
}

function showError(message) {
  messageEl.textContent = '❌ ' + message;
  messageEl.classList.add('error');
  messageEl.classList.remove('success');
}

function clearMessage() {
  messageEl.textContent = '';
  messageEl.classList.remove('success', 'error');
}
</script>

</body>
</html>
