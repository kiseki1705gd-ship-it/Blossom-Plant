<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Plant Database</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="card">

<h1>🌱 Plant Database</h1>

<table>

<thead>
<tr>
<th class="gel">ID</th>
<th class="gel">Name</th>
</tr>
</thead>

<tbody>

{% for plant in plants %}
<tr>
<td class="gel">{{ plant.id }}</td>
<td class="gel">{{ plant.name }}</td>
</tr>
{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
